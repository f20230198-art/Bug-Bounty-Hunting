site_name: Bug Bounty Hunting Workshop
site_description: Rolling workshop notes for students
site_url: https://f20230198-art.github.io/Bug-Bounty-Hunting/
docs_dir: .
site_dir: ../site

theme:
  name: mkdocs

nav:
  - Day 1: Day-1.md
  - Cheat Sheet: CHEATSHEET.md
  - Signup Guide: SIGNUP-GUIDE.md

# Keep the first release limited to Day 1 and essentials.
# When Day 2 starts:
# 1) Add "- Day 2: Day-2.md" under nav.
# 2) Remove "Day-2.md" from exclude_docs.
exclude_docs: |
  .git/
  README.md
  Day-2.md
  Day-3.md
  EXTRA-TOPICS.md
  FAQ.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
